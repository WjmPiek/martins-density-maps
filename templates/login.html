{% extends 'base.html' %}
{% block title %}Login · Martins Density Map{% endblock %}

{% block content %}

<div class="auth-wrap">

  <div class="auth-card">

    <img src="{{ url_for('static', filename='img/martins-logo.png') }}"
         alt="Martins Logo"
         class="login-logo">

    <div class="eyebrow">Martin's Franchising</div>

    <h2 style="margin-bottom: 18px;">Sign in</h2>

    <form method="post" class="auth-form">

      <label>
        Email
        <input type="email" name="email" required>
      </label>

      <label>
        Password
        <input type="password" name="password" required>
      </label>

      <button class="primary-btn" type="submit">
        Login
      </button>

    </form>

  </div>

</div>

{% endblock %}
