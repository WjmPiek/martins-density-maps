{% extends 'base_auth.html' %}
{% block title %}Reset Password · Martins Density Map{% endblock %}

{% block content %}
<section class="auth-wrap">
  <div class="auth-card auth-card-wide">
    <img
      src="{{ url_for('static', filename='img/martins-logo.png') }}"
      class="login-logo"
      width="300"
      height="110"
      alt="Martins Logo"
    >
    <p class="auth-subtitle">Martin's Franchising</p>

    <form method="POST" class="auth-form">
      <label>
        Email
        <input type="email" name="email" required>
      </label>

      <label>
        New password
        <input type="password" name="password" required>
      </label>

      <label>
        Confirm new password
        <input type="password" name="confirm_password" required>
      </label>

      <button class="primary-btn" type="submit">Reset password</button>

      <div class="auth-footer">
        <a href="{{ url_for('auth.login') }}">Back to login</a>
      </div>
    </form>
  </div>
</section>
{% endblock %}
