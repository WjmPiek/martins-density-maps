{% extends 'base.html' %}
{% block title %}Login · Martins Density Map{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <img
      src="{{ url_for('static', filename='img/martins-logo.png') }}"
      class="login-logo"
      alt="Martins Logo"
    >

    <div class="eyebrow">Martin's Franchising</div>
    <h2 style="margin: 6px 0 18px 0;">Sign in</h2>

    <form method="POST" class="auth-form">

  <label>
    Email
    <input type="email" name="email" required>
  </label>

  <label>
    Password
    <input type="password" name="password" required>
  </label>

  <button class="primary-btn" type="submit">Login</button>

  <div class="auth-footer">
    <a href="{{ url_for('register') }}">Register New User</a>
  </div>

  <div class="auth-install">
    Install App
  </div>

</form>
  </div>
</div>
{% endblock %}
