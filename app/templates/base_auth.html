<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}Martins Login{% endblock %}</title>

  <link rel="preload" href="{{ url_for('static', filename='img/martins-logo.png') }}" as="image">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#8d6fd1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HeatMap">
</head>


<body class="auth-body">
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <section class="flash-stack auth-flash-stack">
    {% for category, message in messages %}
    <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  </section>
  {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}

  <script>
  let deferredPrompt = null;
  const installBtn = document.getElementById("installApp");
  const installHelp = document.getElementById("installHelp");

  async function registerServiceWorker() {
    if (!("serviceWorker" in navigator)) return;
    try {
      await navigator.serviceWorker.register("/static/service-worker.js", { scope: "/" });
    } catch (err) {
      console.error("Service worker registration failed:", err);
    }
  }

  function setInstallHelp(message) {
    if (!installHelp) return;
    installHelp.textContent = message;
    installHelp.hidden = !message;
  }

  function showInstallButton() {
    if (installBtn) installBtn.hidden = false;
  }

  function hideInstallButton() {
    if (installBtn) installBtn.hidden = true;
  }

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    showInstallButton();
    setInstallHelp("");
  });

  if (installBtn) {
    installBtn.addEventListener("click", async () => {
      const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

      if (isStandalone) {
        setInstallHelp("HeatMap is already installed on this device.");
        return;
      }

      if (deferredPrompt) {
        setInstallHelp("");
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        hideInstallButton();
        return;
      }

      if (isIos) {
        showInstallButton();
        setInstallHelp("On iPhone or iPad, tap Share and then Add to Home Screen.");
        return;
      }

      showInstallButton();
      setInstallHelp("Install is available once the browser marks this app ready. Refresh the page after a few seconds if needed.");
    });
  }

  window.addEventListener("appinstalled", () => {
    hideInstallButton();
    setInstallHelp("");
    deferredPrompt = null;
  });

  window.addEventListener("load", () => {
    registerServiceWorker();
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (!isStandalone) showInstallButton();
  });
</script>

</body>
</html>
