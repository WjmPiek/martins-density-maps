{% extends 'base_auth.html' %}
{% block title %}Login · Martins Density Map{% endblock %}

{% block content %}
<section class="auth-wrap">
  <div class="auth-card">
    <img
      src="{{ url_for('static', filename='img/martins-logo.png') }}"
      class="login-logo"
      width="260"
      height="96"
      alt="Martins Logo"
    >

    <form method="POST" class="auth-form">
      <label>
        Email
        <input type="email" name="email" required>
      </label>

      <label>
        Password
        <input type="password" name="password" required>
      </label>

      <button class="primary-btn" type="submit">Login</button>

      <div class="auth-footer">
        <a href="{{ url_for('register') }}">Register New User</a>
      </div>

      <div class="auth-install" id="installApp" style="display:none;">
        Install App
      </div>
    </form>
  </div>
</section>
{% endblock %}
