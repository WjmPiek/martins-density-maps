services:
  - type: web
    name: martins-density-map
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: ADMIN_EMAIL
        sync: false

      - key: ADMIN_PASSWORD
        sync: false

      - key: ADMIN_NAME
        value: Martins Admin

      - key: GOOGLE_MAPS_API_KEY
        sync: false

      - key: DATABASE_URL
        fromDatabase:
          name: martins-density-db
          property: connectionString

databases:
  - name: martins-density-db
    plan: basic-256mb